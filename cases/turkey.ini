# Turkiye ve cevresi gercek veri tahmini (GFS baslangic + sinir kosullari).
# Once on isleme: python tools/prep_gfs.py cases/turkey.ini --date YYYYMMDD --cycle 00 --hours 24
# Sonra kosu:     build\wfe.exe cases\turkey.ini

nx = 160
ny = 100
nz = 40
dx = 12000
dy = 12000
dz = 500              # stretch ile gecersiz kilinir

stretch = geometric
dz0 = 250
dz_ratio = 1.09
dz_max = 1000

# Lambert konformal projeksiyon (merkez Anadolu)
proj_lat0 = 39.0
proj_lon0 = 35.0
proj_lat1 = 35.0
proj_lat2 = 43.0

dt = 30
acoustic_ns = 4       # dx=12km: asama alt-adimlari {10,7.5,7.5}s, akustik CFL<=0.6
t_end = 86400         # 24 saat

profile = file        # taban durumu wfe_init.bin tablolarindan
terrain = file        # arazi wfe_init.bin'den
input_dir = out/turkey_prep
physics = simple      # yuzey katmani + PBL + levha toprak + basit radyasyon
pbl = nonlocal        # Troen-Mahrt K-profili + karsi-gradyan (yerel-K yerine)

bc_x = open
bc_y = open
bdy_width = 8         # Davies relaksasyon bolgesi [hucre]
bdy_tau = 600         # relaksasyon zaman olcegi [s]
nudge_tau = 21600     # ic bolge analiz-nudging zaman olcegi [s] (6h; 0=kapali)
w_damping = on        # dikey Courant korumasi (operasyonel saglamlik)
pd_moist = on         # pozitif-tanimli nem adveksiyonu (negatif su/sahte yagis onler)
rayleigh_zd = 18000
rayleigh_alpha = 0.02

out_dir = out/turkey
out_interval = 10800  # 3 saat
diag_interval = 900


