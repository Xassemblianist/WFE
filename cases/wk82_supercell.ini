# Weisman-Klemp (1982) firtina testi: nemli sounding + tek yonlu ruzgar
# kesmesi + 2K tetik kabarcigi. Beklenen: derin konveksiyon, yagisla birlikte
# soguk havuz, firtinanin sag/sol-hareketli hucrelere bolunmesi (ayna simetrik),
# w_max ~ 30-45 m/s.

nx = 96
ny = 96
nz = 40
dx = 1000
dy = 1000
dz = 500

dt = 5
acoustic_ns = 6
t_end = 7200

profile = wk82           # nemli WK82 soundingi (qv tavani 14 g/kg) — nem acilir
wind_profile = tanh      # ub = us*tanh(z/zs) + offset
wind_us = 25
wind_zs = 3000
wind_offset = -12        # firtinayi alanda tutmak icin ortalama akis cikarilir

bc_x = open
bc_y = open
rayleigh_zd = 16000
rayleigh_alpha = 0.03

bubble_dtheta = 2
bubble_xc = 48000
bubble_yc = 48000
bubble_zc = 1400
bubble_xr = 10000
bubble_yr = 10000
bubble_zr = 1400

out_dir = out/wk82
out_interval = 600
diag_interval = 120
