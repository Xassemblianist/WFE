# Schaer ve dig. (2002) dag dalgasi testi: cift olcekli dag (zarf a=5km,
# salinim lambda=4km), U=10 m/s, N=0.01 1/s. Beklenen: duragan dalga deseni —
# genis olcek hidrostatik dalga yukari yayilir, kucuk olcek (lambda=4km <
# 2*pi*U/N=6.3km) sonumlenerek (evanescent) yukselir.

nx = 200
ny = 4
nz = 50
dx = 500
dy = 500
dz = 400

dt = 2.5
acoustic_ns = 6
t_end = 18000        # 5 saat: duragan durum icin ~ Ut/a = 36

profile = constant_N
theta0 = 288
bv_N = 0.01
wind_u = 10

terrain = schaer
mtn_h0 = 250
mtn_a = 5000
mtn_lambda = 4000
mtn_xc = 50000

bc_x = open
bc_y = periodic
rayleigh_zd = 13000
rayleigh_alpha = 0.05

out_dir = out/schaer
out_interval = 3600
diag_interval = 900
