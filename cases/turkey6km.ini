# Turkiye 6 km — operasyonel iyi cozunurluk (tum ulke + cevre).
# turkey.ini'nin (12 km) 2x cozunurluklu surumu: ayni alan, gercek yuksek
# cozunurluklu arazi (AWS Terrain Tiles) ile orografik detay (dagfronu, kiyi,
# vadi). 12 km GFS-turevi orografinin goremedigi olcek.
#
# Akis:
#   python tools/get_terrain.py cases/turkey6km.ini --zoom 9   # yuksek coz. DEM (bir kez; cok karo)
#   python tools/prep_gfs.py    cases/turkey6km.ini --date YYYYMMDD --cycle 00 --hours 24
#   build\wfe.exe cases\turkey6km.ini
# veya tek komut:  python tools/run_forecast.py cases/turkey6km.ini --hours 24

nx = 320
ny = 200
nz = 44
dx = 6000
dy = 6000
dz = 500              # stretch ile gecersiz kilinir

stretch = geometric
dz0 = 200
dz_ratio = 1.08
dz_max = 700

# Lambert konformal projeksiyon (merkez Anadolu) — turkey.ini ile ayni alan
proj_lat0 = 39.0
proj_lon0 = 35.0
proj_lat1 = 35.0
proj_lat2 = 43.0

dt = 15               # akustik CFL: asama-0 dtau=dt/3=5s < 0.5*dx/c=8.6s (c~350)
acoustic_ns = 4
t_end = 86400         # 24 saat

profile = file        # taban durumu wfe_init.bin tablolarindan
terrain = file        # arazi wfe_init.bin'den
terrain_source = tiles   # yuksek coz. DEM (out/turkey6km_prep/terrain.bin)
input_dir = out/turkey6km_prep
physics = simple      # yuzey katmani + PBL + levha toprak + basit radyasyon
pbl = nonlocal        # Troen-Mahrt K-profili + karsi-gradyan

bc_x = open
bc_y = open
bdy_width = 8         # Davies relaksasyon bolgesi [hucre]
bdy_tau = 600         # relaksasyon zaman olcegi [s]
nudge_tau = 10800     # ic bolge analiz-nudging [s] (3h; cok-vaka+METAR ayarli)
w_damping = on        # dikey Courant korumasi (operasyonel saglamlik)
pd_moist = on         # pozitif-tanimli nem adveksiyonu
rayleigh_zd = 18000
rayleigh_alpha = 0.02

out_dir = out/turkey6km
out_interval = 3600   # saatlik urun (web animasyonu + saatlik meteogram; ~90MB/adim)
diag_interval = 900
