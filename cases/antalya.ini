# Antalya yuksek cozunurluklu yerel model (2.5 km). Toros Daglari + Akdeniz
# kiyisi etkilesimini (deniz meltemi, orografik ruzgar/yagis) cozer — 12km
# GFS'in goremedigi detay. Yuksek coz. gercek arazi AWS Terrain Tiles'tan.
#
# Akis:
#   python tools/get_terrain.py cases/antalya.ini            # yuksek coz. DEM indir
#   python tools/prep_gfs.py cases/antalya.ini --date ... --cycle .. --hours 24
#   build\wfe.exe cases/antalya.ini
#   python tools/forecast_maps.py cases/antalya.ini

nx = 140
ny = 120
nz = 44
dx = 2500
dy = 2500
dz = 300              # stretch ile gecersiz

stretch = geometric
dz0 = 180             # yuzeye yakin ince (deniz meltemi/BL)
dz_ratio = 1.08
dz_max = 700

# Lambert konformal — Antalya korfezi merkezli
proj_lat0 = 36.9
proj_lon0 = 30.9
proj_lat1 = 35.5
proj_lat2 = 38.3

dt = 9               # akustik CFL: asama-0 dtau=dt/3=3s < 0.5*dx/c=3.6s
acoustic_ns = 4
t_end = 86400        # 24 saat

profile = file
terrain = file
terrain_source = tiles   # yuksek coz. DEM (out/antalya_prep/terrain.bin)
input_dir = out/antalya_prep
physics = simple
pbl = nonlocal

bc_x = open
bc_y = open
bdy_width = 8
bdy_tau = 600
nudge_tau = 0        # yalniz sinir relaksasyonu — ic bolge terrain detayini serbest gelistirir
w_damping = on
pd_moist = on
rayleigh_zd = 17000
rayleigh_alpha = 0.03

out_dir = out/antalya
out_interval = 3600  # 1 saat (deniz meltemi dongusu icin sik)
diag_interval = 600
