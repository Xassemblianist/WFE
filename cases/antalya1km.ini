# Antalya 1 km konveksiyon-cozucu ic alan (stres testi + en yuksek detay).
# Akis: get_terrain (zoom 11) -> prep_gfs -> wfe. Akustik CFL cok siki: dt=4s.

nx = 160
ny = 140
nz = 44
dx = 1000
dy = 1000
dz = 300

stretch = geometric
dz0 = 120
dz_ratio = 1.08
dz_max = 600

proj_lat0 = 36.9
proj_lon0 = 30.8
proj_lat1 = 36.0
proj_lat2 = 37.8

dt = 4               # 1km akustik CFL: asama-0 dtau=dt/3=1.33s < 0.5*1000/350=1.43s
acoustic_ns = 4
t_end = 86400

profile = file
terrain = file
terrain_source = tiles
input_dir = out/antalya1km_prep
physics = simple
pbl = nonlocal

bc_x = open
bc_y = open
bdy_width = 10
bdy_tau = 400
nudge_tau = 0
w_damping = on
pd_moist = on
rayleigh_zd = 17000
rayleigh_alpha = 0.04

out_dir = out/antalya1km
out_interval = 3600
diag_interval = 600
