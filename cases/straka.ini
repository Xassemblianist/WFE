# Straka (1993) yogunluk akintisi benchmark'i — soguk kabarcik cokup yayilir.
# Referans (100 m cozunurluk): t=900s'de yuzey cephesi merkezden ~15 km,
# theta'_min ~ -9..-10 K, uc Kelvin-Helmholtz rotoru.
# Kaynak testi 2B'dir; burada ince periyodik y (4 hucre) ile kosulur.

nx = 512
ny = 4
nz = 64
dx = 100
dy = 100
dz = 100

dt = 0.75            # split-explicit: adveksiyon CFL; akustik alt-adim dt/6
acoustic_ns = 6
t_end = 900

profile = isentropic
theta0 = 300
diff_K = 75          # Straka'nin tanimladigi sabit viskozite [m2/s]

bubble_dtheta = -15
bubble_xc = 25600
bubble_yc = 200
bubble_zc = 3000
bubble_xr = 4000
bubble_yr = 1e9      # y'de tekduze (2B esdegeri)
bubble_zr = 2000

out_dir = out/straka
out_interval = 300
diag_interval = 60
