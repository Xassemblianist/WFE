# Pozitif-tanimli nem adveksiyonu testi: diverjanssiz uniform oteleme.
# Duz zemin + yatay-homojen taban + sabit u => div(rho_b V) = 0, dolayisiyla
# tutarlilik terimi sifir; keskin qv blobu domainden gecerken 5. mertebe sema
# alt/ust asim yapar (negatif qv), pozitif-tanimli sema qv>=0'i korumali.
# Mikrofizik KAPALI (saf adveksiyon gozlemi icin — Kessler kirpma yapmaz).

nx = 200
ny = 4
nz = 40
dx = 200
dy = 200
dz = 200

dt = 1.0
acoustic_ns = 6
t_end = 2000          # blob ~10 km oteler (u=5 => 10 km) — domain ortasindan gecer

profile = isentropic
theta0 = 300
wind_u = 5

microphysics = off    # saf adveksiyon
pd_moist = on

qvbub_dq = 0.010      # 10 g/kg blob (keskin cos^2)
qvbub_xc = 10000
qvbub_zc = 4000
qvbub_xr = 2000
qvbub_zr = 2000

out_dir = out/moist_blob
out_interval = 1000
diag_interval = 500
