<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WFE — Hava Tahmin Modeli</title>
<style>
  :root { --bg:#0f1720; --panel:#1a2531; --fg:#e6edf3; --muted:#8aa0b4; --accent:#3fa7ff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:16px 24px; background:var(--panel); border-bottom:1px solid #26323f; }
  header h1 { margin:0; font-size:20px; } header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
  main { display:grid; grid-template-columns: 1fr 360px; gap:16px; padding:16px 24px; }
  @media (max-width:900px){ main { grid-template-columns:1fr; } }
  .card { background:var(--panel); border:1px solid #26323f; border-radius:10px; padding:14px; }
  select, input, button { background:#0f1720; color:var(--fg); border:1px solid #2b3a49;
    border-radius:6px; padding:8px; font-size:14px; }
  button { background:var(--accent); color:#04121f; border:none; cursor:pointer; font-weight:600; }
  img#map { width:100%; border-radius:8px; display:block; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:right; padding:5px 6px; border-bottom:1px solid #26323f; }
  th:first-child, td:first-child { text-align:left; color:var(--muted); }
  .muted { color:var(--muted); font-size:12px; }
  #chart { width:100%; height:120px; }
</style>
</head>
<body>
<header>
  <h1>WFE — Weather Forecast Engine</h1>
  <p>GPU-yerlisi bölgesel hava tahmin modeli · GFS-güdümlü · yüksek çözünürlüklü gerçek arazi</p>
</header>
<main>
  <div class="card">
    <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
      <select id="region"></select>
      <select id="step"></select>
      <span id="init" class="muted"></span>
    </div>
    <img id="map" alt="tahmin haritası">
  </div>
  <div class="card">
    <h3 style="margin:0 0 10px;">Nokta tahmini</h3>
    <div style="display:flex; gap:8px; margin-bottom:10px;">
      <input id="lat" type="number" step="0.01" placeholder="enlem" value="36.90" style="width:90px;">
      <input id="lon" type="number" step="0.01" placeholder="boylam" value="30.70" style="width:90px;">
      <button onclick="loadPoint()">Getir</button>
    </div>
    <canvas id="chart"></canvas>
    <div id="ptinfo" class="muted"></div>
    <table id="pttable"></table>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
